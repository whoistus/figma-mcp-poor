name: Release

# Triggered by pushing a tag like v0.3.0 — builds the Figma plugin
# and attaches a zip of it as a release asset.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build:plugin

      - name: Package plugin
        run: |
          VERSION="${GITHUB_REF_NAME}"
          STAGE="figma-plugin-${VERSION}"
          mkdir -p "$STAGE"
          cp figma-plugin/manifest.json "$STAGE/"
          cp -R figma-plugin/dist "$STAGE/"
          cp README.md "$STAGE/" 2>/dev/null || true
          zip -r "figma-plugin-${VERSION}.zip" "$STAGE"

      - name: Create release + upload plugin zip
        uses: softprops/action-gh-release@v2
        with:
          files: figma-plugin-v*.zip
          generate_release_notes: true
          draft: false
          prerelease: false
